$:
  push:    
    - name: 生成 Code Wiki
      stages:
        - timeout: 4h
          image: cnbcool/codewiki:latest
          settings:
            git_doc_dir: /${CNB_BUILD_WORKSPACE}/${CNB_REPO_SLUG}/docs
        - image: cnbcool/knowledge-base
          settings:
            include: "docs/**.md"